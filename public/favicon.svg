    <rect x="44" y="16" width="2" height="24" fill="#D79A77"/>

    <!-- EARS -->
    <rect x="14" y="22" width="4" height="10" fill="#D99673"/>
    <rect x="46" y="22" width="4" height="10" fill="#D99673"/>

    <!-- EYEBROWS -->
