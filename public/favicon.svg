    <rect x="34" y="24" width="8" height="2" fill="#2E1F1A"/>

    <!-- EYES -->
    <rect x="22" y="28" width="6" height="4" fill="#FFFFFF"/>
    <rect x="34" y="28" width="6" height="4" fill="#FFFFFF"/>
    <rect x="24" y="28" width="3" height="4" fill="#1A1A1A"/>
    <rect x="36" y="28" width="3" height="4" fill="#1A1A1A"/>
    <rect x="25" y="29" width="1" height="1" fill="#FFFFFF"/>
    <rect x="37" y="29" width="1" height="1" fill="#FFFFFF"/>

    <!-- NOSE -->
    <rect x="29" y="32" width="4" height="2" fill="#D1906D"/>
    <rect x="28" y="34" width="6" height="1" fill="#B87555"/>

    <!-- MUSTACHE -->
