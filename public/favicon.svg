    <rect x="26" y="14" width="2" height="4" fill="#0B0C10"/>
    <rect x="30" y="14" width="2" height="5" fill="#0B0C10"/>
    <rect x="34" y="14" width="2" height="4" fill="#0B0C10"/>
    <rect x="38" y="14" width="2" height="5" fill="#0B0C10"/>
    <rect x="42" y="14" width="2" height="4" fill="#0B0C10"/>

